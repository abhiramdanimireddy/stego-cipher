<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StegoCipher — Secret Message Hider</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h2 { text-align: center; font-size: 22px; margin-bottom: 4px; }

    .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 12px; }

    .badges { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }

    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: bold; }
    .badge-green { background: #f0fdf4; color: #166534; }
    .badge-gray  { background: #f3f4f6; color: #374151; }

    .tabs { display: flex; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; margin-bottom: 22px; }

    .tab {
      flex: 1; padding: 11px; border: none; cursor: pointer;
      font-weight: bold; font-size: 14px; background: #f0f0f0; color: #333; transition: all 0.2s;
    }
    .tab.active { background: #2563eb; color: white; }

    .step-label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
    .step-block { margin-bottom: 18px; }

    input[type="text"], input[type="password"], textarea {
      width: 100%; padding: 10px; font-size: 14px;
      border: 1px solid #ccc; border-radius: 5px; font-family: Arial, sans-serif;
    }
    textarea { resize: vertical; }

    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 60px; }

    .show-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      border: none; background: none; cursor: pointer; font-size: 12px; color: #888;
    }

    .strength-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 12px; }

    .char-count { font-size: 11px; color: #aaa; text-align: right; margin-top: 4px; }

    .upload-btn { padding: 9px 16px; border: 1px solid #ccc; border-radius: 5px; background: white; cursor: pointer; font-size: 14px; }

    .file-name { margin-left: 10px; font-size: 13px; color: #555; }

    #preview-img {
      width: 100%; max-height: 160px; object-fit: contain;
      border-radius: 6px; border: 1px solid #ddd; margin-bottom: 18px; display: none;
    }

    .action-btn {
      width: 100%; padding: 12px; font-size: 15px; font-weight: bold;
      border: none; border-radius: 6px; cursor: pointer; background: #2563eb; color: white; transition: background 0.2s;
    }
    .action-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .result-box { margin-top: 20px; padding: 16px; border-radius: 6px; }
    .result-box.success   { background: #f0fdf4; border: 1px solid #86efac; }
    .result-box.warning   { background: #fffbeb; border: 1px solid #fcd34d; }
    .result-box.decode-ok { background: #eff6ff; border: 1px solid #93c5fd; }

    .result-title         { font-weight: bold; margin-bottom: 10px; }
    .result-title.green   { color: #166534; }
    .result-title.blue    { color: #1e40af; }
    .result-title.amber   { color: #92400e; }

    .message-box {
      background: white; border: 1px solid #ddd; border-radius: 4px;
      padding: 12px; font-size: 14px; white-space: pre-wrap; word-break: break-word; line-height: 1.7;
    }

    .warn-detail {
      font-size: 12px; color: #92400e; background: #fef3c7;
      padding: 8px 10px; border-radius: 4px; line-height: 1.6; margin-bottom: 10px;
    }

    .download-link {
      display: inline-block; padding: 9px 22px; background: #16a34a;
      color: white; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 14px;
    }

    .decode-meta { font-size: 11px; color: #888; margin-top: 8px; }

    .error-box {
      margin-top: 14px; padding: 10px 14px; background: #fef2f2;
      border: 1px solid #fca5a5; border-radius: 5px; color: #b91c1c; font-size: 13px;
    }

    .footer { margin-top: 28px; text-align: center; }
    .footer-tip { font-size: 11px; color: #bbb; margin-bottom: 8px; }
    .signature  { font-size: 12px; color: #9ca3af; letter-spacing: 1px; }

    canvas { display: none; }
  </style>
</head>
<body>
<div class="container">
  <canvas id="canvas"></canvas>
  <input type="file" id="file-input" accept="image/*" style="display:none" />

  <h2>🔐 StegoCipher</h2>
  <p class="subtitle">Hide secret messages invisibly inside any image</p>

  <div class="badges">
    <span class="badge badge-green">📴 Offline</span>
    <span class="badge badge-gray">🔒 Private</span>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-encode" onclick="switchTab('encode')">🔒 Hide Message</button>
    <button class="tab"        id="tab-decode" onclick="switchTab('decode')">🔓 Reveal Message</button>
  </div>

  <div class="step-block">
    <label class="step-label">Step 1 — Upload an image</label>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">📁 Choose Image</button>
    <span class="file-name" id="file-name"></span>
  </div>

  <img id="preview-img" alt="Uploaded image" />

  <div class="step-block">
    <label class="step-label" id="pass-label">Step 2 — Set a password</label>
    <div class="pass-wrap">
      <input type="password" id="password" placeholder="Enter your password" oninput="onPasswordChange()" />
      <button class="show-btn" onclick="togglePassword()">Show</button>
    </div>
    <div class="strength-row">
      <span id="strength-label" style="font-weight:bold"></span>
    </div>
  </div>

  <div class="step-block" id="message-block">
    <label class="step-label">Step 3 — Type your secret message</label>
    <textarea id="message" rows="4" placeholder="Type your secret message here..." oninput="onMessageChange()"></textarea>
    <div class="char-count" id="char-count"></div>
  </div>

  <button class="action-btn" id="action-btn" onclick="handleAction()">🔒 Hide Message in Image</button>

  <div id="encode-result" style="display:none"></div>
  <div id="decode-result" style="display:none"></div>
  <div id="error-box"     style="display:none" class="error-box"></div>

  <div class="footer">
    <p class="footer-tip">💡 Always share as PNG — other formats may destroy the hidden data</p>
    <p class="signature">— Abhiram Danimireddy —</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CORE CIPHER
// ═══════════════════════════════════════════════════

function getOrigin(password) {
  const p = password.padEnd(3, '!');
  return [p.charCodeAt(0), p.charCodeAt(1), p.charCodeAt(2)];
}

function getMagic(password) {
  const p = password.padEnd(3, '!');
  return [
    (p.charCodeAt(0) + 7)  % 256,
    (p.charCodeAt(1) + 13) % 256,
    (p.charCodeAt(2) + 17) % 256,
  ];
}

function getSalt(password, index) {
  const sum = password.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  return [
    (sum * (index + 1) * 7)  % 256,
    (sum * (index + 1) * 13) % 256,
    (sum * (index + 1) * 17) % 256,
  ];
}

function calcChecksum(message) {
  let cs = 0;
  for (let i = 0; i < message.length; i++)
    cs = (cs + message.charCodeAt(i) * (i + 1)) % 65536;
  return cs;
}

const PRINTABLE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';

function padMessage(message) {
  const minLen = Math.max(30, Math.ceil(message.length / 3) * 3);
  let padded = message;
  while (padded.length < minLen || padded.length % 3 !== 0)
    padded += PRINTABLE[Math.floor(Math.random() * PRINTABLE.length)];
  return padded;
}

function encodeToBytes(message, password) {
  const [ox, oy, oz] = getOrigin(password);
  const [m1, m2, m3] = getMagic(password);
  const checksum     = calcChecksum(message);
  const padded       = padMessage(message);
  const realLength   = message.length;
  const bytes        = [];

  bytes.push(m1, m2, m3);
  bytes.push((realLength >> 8) & 0xff, realLength & 0xff);

  for (let i = 0; i < padded.length / 3; i++) {
    const c1 = padded.charCodeAt(i * 3);
    const c2 = padded.charCodeAt(i * 3 + 1);
    const c3 = padded.charCodeAt(i * 3 + 2);
    const [sx, sy, sz] = getSalt(password, i);
    bytes.push(
      (c1 + ox + sx) % 256,
      (c2 + oy + sy) % 256,
      (c3 + oz + sz) % 256,
    );
  }

  bytes.push((checksum >> 8) & 0xff, checksum & 0xff);
  return bytes;
}

function decodeFromBytes(bytes, password) {
  const [ox, oy, oz] = getOrigin(password);
  const [m1, m2, m3] = getMagic(password);

  if (bytes[0] !== m1 || bytes[1] !== m2 || bytes[2] !== m3)
    return { success: false, error: 'Wrong password — or no hidden message in this image.' };

  const realLength = (bytes[3] << 8) | bytes[4];
  if (realLength === 0 || realLength > 65535)
    return { success: false, error: 'Could not read message. Image may be corrupted.' };

  const coordBytes = bytes.slice(5, bytes.length - 2);
  let padded = '';

  for (let i = 0; i < Math.floor(coordBytes.length / 3); i++) {
    const x = coordBytes[i * 3];
    const y = coordBytes[i * 3 + 1];
    const z = coordBytes[i * 3 + 2];
    const [sx, sy, sz] = getSalt(password, i);
    padded += String.fromCharCode(
      ((x - ox - sx) % 256 + 256) % 256,
      ((y - oy - sy) % 256 + 256) % 256,
      ((z - oz - sz) % 256 + 256) % 256,
    );
  }

  const message    = padded.slice(0, realLength);
  const storedCs   = (bytes[bytes.length - 2] << 8) | bytes[bytes.length - 1];
  const checksumOk = storedCs === calcChecksum(message);

  return { success: true, message, checksumOk };
}

// ═══════════════════════════════════════════════════
// LSB STEGANOGRAPHY
// ═══════════════════════════════════════════════════

function bytesToBits(bytes) {
  const bits = [];
  for (const byte of bytes)
    for (let b = 7; b >= 0; b--) bits.push((byte >> b) & 1);
  return bits;
}

function lsbEncode(imageData, bytes) {
  const bits = bytesToBits(bytes);
  const data  = new Uint8ClampedArray(imageData.data);
  if (bits.length > Math.floor((data.length / 4) * 3))
    throw new Error('Message is too long for this image. Please use a larger image.');
  let bi = 0;
  for (let i = 0; i < data.length && bi < bits.length; i++) {
    if ((i + 1) % 4 === 0) continue;
    data[i] = (data[i] & 0xfe) | bits[bi++];
  }
  return new ImageData(data, imageData.width, imageData.height);
}

function lsbDecode(imageData, byteCount) {
  const data   = imageData.data;
  const bits   = [];
  const needed = byteCount * 8;
  for (let i = 0; i < data.length && bits.length < needed; i++) {
    if ((i + 1) % 4 === 0) continue;
    bits.push(data[i] & 1);
  }
  const bytes = [];
  for (let i = 0; i + 7 < bits.length; i += 8) {
    let byte = 0;
    for (let b = 0; b < 8; b++) byte = (byte << 1) | bits[i + b];
    bytes.push(byte);
  }
  return bytes;
}

// ═══════════════════════════════════════════════════
// IMAGE HELPERS
// ═══════════════════════════════════════════════════

function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result);
    r.onerror = () => rej(new Error('Could not read file.'));
    r.readAsDataURL(file);
  });
}

function drawToCanvas(dataURL) {
  return new Promise((res, rej) => {
    const img    = new Image();
    const canvas = document.getElementById('canvas');
    img.onload = () => {
      canvas.width  = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      res(ctx);
    };
    img.onerror = () => rej(new Error('Could not render image.'));
    img.src = dataURL;
  });
}

// ═══════════════════════════════════════════════════
// UI STATE
// ═══════════════════════════════════════════════════

let currentMode   = 'encode';
let currentImgURL = null;
let showPassword  = false;

function switchTab(mode) {
  currentMode   = mode;
  currentImgURL = null;
  document.getElementById('preview-img').style.display     = 'none';
  document.getElementById('file-name').textContent         = '';
  document.getElementById('password').value                = '';
  document.getElementById('message').value                 = '';
  document.getElementById('strength-label').textContent    = '';
  document.getElementById('char-count').textContent        = '';
  document.getElementById('encode-result').style.display   = 'none';
  document.getElementById('decode-result').style.display   = 'none';
  document.getElementById('error-box').style.display       = 'none';
  document.getElementById('tab-encode').className = 'tab' + (mode === 'encode' ? ' active' : '');
  document.getElementById('tab-decode').className = 'tab' + (mode === 'decode' ? ' active' : '');
  document.getElementById('message-block').style.display   = mode === 'encode' ? 'block' : 'none';
  document.getElementById('pass-label').textContent        = mode === 'encode' ? 'Step 2 — Set a password' : 'Step 2 — Enter the password';
  document.getElementById('action-btn').textContent        = mode === 'encode' ? '🔒 Hide Message in Image' : '🔍 Reveal Hidden Message';
}

function togglePassword() {
  showPassword = !showPassword;
  document.getElementById('password').type = showPassword ? 'text' : 'password';
  document.querySelector('.show-btn').textContent = showPassword ? 'Hide' : 'Show';
}

function onPasswordChange() {
  const pw = document.getElementById('password').value;
  if (pw.length < 3) {
    document.getElementById('strength-label').textContent = 'Too short';
    document.getElementById('strength-label').style.color = '#ef4444';
    return;
  }
  const score  = [/[A-Z]/, /[a-z]/, /[0-9]/, /[^a-zA-Z0-9]/].filter(r => r.test(pw)).length;
  const labels = ['', 'Weak', 'Fair', 'Good ✅', 'Strong 💪'];
  const colors  = ['', '#ef4444', '#f59e0b', '#16a34a', '#2563eb'];
  document.getElementById('strength-label').textContent = 'Strength: ' + (labels[score] || 'Weak');
  document.getElementById('strength-label').style.color = colors[score] || '#ef4444';
}

function onMessageChange() {
  const len = document.getElementById('message').value.length;
  document.getElementById('char-count').textContent = len > 0 ? `${len} characters` : '';
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent   = '⚠️ ' + msg;
  el.style.display = 'block';
}

function clearError() {
  document.getElementById('error-box').style.display = 'none';
}

// ═══════════════════════════════════════════════════
// FILE UPLOAD
// ═══════════════════════════════════════════════════

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showError('Please upload a valid image.'); return; }
  clearError();
  document.getElementById('encode-result').style.display = 'none';
  document.getElementById('decode-result').style.display = 'none';
  try {
    currentImgURL = await readFileAsDataURL(file);
    const img = document.getElementById('preview-img');
    img.src           = currentImgURL;
    img.style.display = 'block';
    document.getElementById('file-name').textContent = '✅ ' + file.name;
  } catch(err) { showError(err.message); }
});

// ═══════════════════════════════════════════════════
// MAIN ACTION
// ═══════════════════════════════════════════════════

async function handleAction() {
  clearError();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('action-btn');
  if (!currentImgURL)       { showError('Upload an image first.'); return; }
  if (password.length < 3)  { showError('Password must be at least 3 characters.'); return; }
  btn.disabled    = true;
  btn.textContent = '⏳ Working...';
  try {
    currentMode === 'encode' ? await doEncode(password) : await doDecode(password);
  } catch(err) {
    showError(err.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = currentMode === 'encode' ? '🔒 Hide Message in Image' : '🔍 Reveal Hidden Message';
  }
}

async function doEncode(password) {
  const message = document.getElementById('message').value;
  if (!message.trim()) { showError('Enter a secret message.'); return; }
  const canvas  = document.getElementById('canvas');
  const ctx     = await drawToCanvas(currentImgURL);
  const idata   = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const bytes   = encodeToBytes(message, password);
  const encoded = lsbEncode(idata, bytes);
  ctx.putImageData(encoded, 0, 0);
  const outputURL = canvas.toDataURL('image/png');
  const resultEl  = document.getElementById('encode-result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `
    <div class="result-box success">
      <p class="result-title green">✅ Message hidden successfully!</p>
      <img src="${outputURL}" style="width:100%;max-height:160px;object-fit:contain;border-radius:4px;margin-bottom:12px;" />
      <p style="font-size:12px;color:#555;margin-bottom:12px;">
        The image looks identical to the original. Share it freely — only someone with the correct password and this tool can read it.
      </p>
      <a class="download-link" href="${outputURL}" download="secret_image.png">⬇ Download Image</a>
      <p style="font-size:11px;color:#888;margin-top:10px;">
        ⚠️ Share the image and password separately — never together.
      </p>
    </div>
  `;
  document.getElementById('decode-result').style.display = 'none';
}

async function doDecode(password) {
  const canvas   = document.getElementById('canvas');
  const ctx      = await drawToCanvas(currentImgURL);
  const idata    = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const maxBytes = 3 + 2 + (Math.ceil(10000 / 3) * 3) + 2;
  const rawBytes = lsbDecode(idata, maxBytes);
  const decoded  = decodeFromBytes(rawBytes, password);
  if (!decoded.success) { showError(decoded.error); return; }
  const resultEl = document.getElementById('decode-result');
  resultEl.style.display = 'block';
  if (decoded.checksumOk) {
    resultEl.innerHTML = `
      <div class="result-box decode-ok">
        <p class="result-title blue">🔓 Message revealed successfully!</p>
        <div class="message-box">${escapeHtml(decoded.message)}</div>
        <div class="decode-meta">${decoded.message.length} characters</div>
      </div>
    `;
  } else {
    resultEl.innerHTML = `
      <div class="result-box warning">
        <p class="result-title amber">🔓 Message recovered — ⚠️ integrity check failed</p>
        <div class="warn-detail">
          The image may have been compressed or modified after the message was hidden.
          The message is shown below but may contain errors.
        </div>
        <div class="message-box">${escapeHtml(decoded.message)}</div>
        <div class="decode-meta">${decoded.message.length} characters</div>
      </div>
    `;
  }
  document.getElementById('encode-result').style.display = 'none';
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
